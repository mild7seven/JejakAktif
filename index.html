<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JejakAktif</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#FC4C02">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@v8.2.0/ol.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --strava-orange: #FC4C02; --dark-bg: #1a1a1a; }
        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: var(--dark-bg); color: white; height: 100%; overflow: hidden; }
        
        /* Filter CSS untuk membuat OpenStreetMap gratis menjadi Dark Mode */
        #map { height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; filter: grayscale(0.8) invert(0.9) hue-rotate(180deg) brightness(0.95); }

        .header {
            position: absolute; top: 0; width: 100%; padding: 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 10; text-align: center; pointer-events: none;
        }
        .header h1 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: 2px; color: var(--strava-orange); }

        .stats-container {
            position: absolute; bottom: 0; width: 100%;
            background: rgba(26, 26, 26, 0.95);
            border-top-left-radius: 25px; border-top-right-radius: 25px;
            padding: 25px 20px 40px 20px; z-index: 10;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.7);
            box-sizing: border-box; backdrop-filter: blur(10px);
        }

        .main-stats { display: flex; justify-content: space-between; margin-bottom: 25px; }
        .stat-item { text-align: center; flex: 1; }
        .stat-value { font-size: 1.8rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.7rem; color: #aaa; text-transform: uppercase; font-weight: 600; }

        .btn-record {
            background: var(--strava-orange); color: white; border: none;
            width: 70px; height: 70px; border-radius: 50%;
            font-size: 1.5rem; cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            margin: 0 auto; box-shadow: 0 5px 20px rgba(252, 76, 2, 0.5);
            transition: transform 0.2s;
        }
        .btn-record:active { transform: scale(0.9); }
        .btn-stop { background: #fff; color: #000; border-radius: 12px; padding: 15px 40px; font-weight: 800; display: none; margin: 0 auto; border: none; }

        .status-badge {
            background: rgba(252, 76, 2, 0.15); color: var(--strava-orange);
            padding: 6px 14px; border-radius: 20px; font-size: 0.75rem;
            font-weight: 700; margin-bottom: 15px; display: inline-block;
            border: 1px solid rgba(252, 76, 2, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>JEJAKAKTIF</h1>
    </div>

    <div id="map"></div>

    <div class="stats-container">
        <center><div class="status-badge" id="statusLabel">MENCARI LOKASI...</div></center>
        
        <div class="main-stats">
            <div class="stat-item">
                <span class="stat-value" id="valDist">0.00</span>
                <span class="stat-label">Jarak (KM)</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="valSteps">0</span>
                <span class="stat-label">Langkah</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="valCal">0</span>
                <span class="stat-label">Kalori</span>
            </div>
        </div>

        <button id="btnAction" class="btn-record" disabled style="opacity:0.5;">●</button>
        <button id="btnStop" class="btn-stop">SELESAI</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/ol@v8.2.0/dist/ol.js"></script>
    
    <script>
        let map, vectorSource, markerFeature, lineFeature, watchId, wakeLock = null;
        let isRecording = false;
        let totalMeters = 0;
        let lastLat = null, lastLng = null, lastTimestamp = null;
        
        // Simpan koordinat yang sudah dikonversi ke format EPSG:3857 (Web Mercator)
        let pathCoordinates = [];

        function initMap() {
            // 1. Setup Vektor untuk Rute (Line) dan Lokasi (Marker)
            vectorSource = new ol.source.Vector();
            
            const vectorLayer = new ol.layer.Vector({
                source: vectorSource,
                style: new ol.style.Style({
                    stroke: new ol.style.Stroke({ color: '#FC4C02', width: 6 }), // Warna Garis
                    image: new ol.style.Circle({
                        radius: 8,
                        fill: new ol.style.Fill({ color: '#FC4C02' }), // Warna Marker
                        stroke: new ol.style.Stroke({ color: '#ffffff', width: 3 })
                    })
                })
            });

            // 2. Inisialisasi Peta
            map = new ol.Map({
                target: 'map',
                layers: [
                    new ol.layer.Tile({ source: new ol.source.OSM() }), // OpenStreetMap base
                    vectorLayer
                ],
                view: new ol.View({
                    center: ol.proj.fromLonLat([106.816666, -6.200000]), // [Lon, Lat] Jakarta
                    zoom: 16,
                    maxZoom: 20
                }),
                controls: [] // Hilangkan kontrol bawaan agar UI bersih
            });

            // 3. Setup Objek Geometri
            markerFeature = new ol.Feature();
            lineFeature = new ol.Feature({ geometry: new ol.geom.LineString([]) });
            vectorSource.addFeature(markerFeature);
            vectorSource.addFeature(lineFeature);

            // Mulai pencarian GPS
            startTracking();

            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        }

        // Haversine Formula (menggunakan raw lat/lon)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
        }

        function updateUI() {
            const km = totalMeters / 1000;
            document.getElementById('valDist').innerText = km.toFixed(2);
            document.getElementById('valSteps').innerText = Math.floor(totalMeters / 0.762);
            document.getElementById('valCal').innerText = Math.floor(km * 60);
        }

        function handlePosition(pos) {
            const { latitude, longitude, accuracy } = pos.coords;
            const currentTimestamp = pos.timestamp;
            
            // Konversi GPS standar ke proyeksi peta OpenLayers (EPSG:3857)
            const projectedCoord = ol.proj.fromLonLat([longitude, latitude]); 

            // Aktifkan UI jika GPS terkunci
            const btnStart = document.getElementById('btnAction');
            if (btnStart.disabled && accuracy < 50) {
                btnStart.disabled = false;
                btnStart.style.opacity = '1';
                document.getElementById('statusLabel').innerText = "STANDBY (GPS READY)";
            }

            // Update posisi Marker
            markerFeature.setGeometry(new ol.geom.Point(projectedCoord));
            
            // Kamera mengikuti marker
            if (isRecording || pathCoordinates.length === 0) {
                map.getView().animate({ center: projectedCoord, duration: 500 });
            }

            // Logika Perekaman
            if (isRecording && accuracy < 25) {
                if (lastLat !== null && lastLng !== null) {
                    const distance = calculateDistance(lastLat, lastLng, latitude, longitude);
                    const timeDiff = (currentTimestamp - lastTimestamp) / 1000;
                    
                    if (timeDiff > 0) {
                        const speedKmh = (distance / timeDiff) * 3.6;
                        
                        if (speedKmh <= 7) {
                            totalMeters += distance;
                            document.getElementById('statusLabel').innerText = `RECORDING (${speedKmh.toFixed(1)} km/h)`;
                        } else {
                            document.getElementById('statusLabel').innerText = `PAUSED - SPEED > 7 KM/H`;
                        }
                    }
                }

                // Update Garis Rute (LineString)
                pathCoordinates.push(projectedCoord);
                lineFeature.getGeometry().setCoordinates(pathCoordinates);
                
                updateUI();
                lastLat = latitude;
                lastLng = longitude;
                lastTimestamp = currentTimestamp;
            }
        }

        function startTracking() {
            watchId = navigator.geolocation.watchPosition(handlePosition, 
                err => document.getElementById('statusLabel').innerText = "GPS ERROR", 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
            );
        }

        async function toggleRecord() {
            isRecording = true;
            lastLat = null; lastLng = null; pathCoordinates = [];
            totalMeters = 0; updateUI();
            
            // Bersihkan rute sebelumnya
            lineFeature.getGeometry().setCoordinates([]);

            document.getElementById('btnAction').style.display = 'none';
            document.getElementById('btnStop').style.display = 'block';
            document.getElementById('statusLabel').innerText = "RECORDING START";
            
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } 
                catch (err) { console.error("Wake Lock gagal:", err); }
            }
        }

        function stopRecord() {
            isRecording = false;
            document.getElementById('btnAction').style.display = 'flex';
            document.getElementById('btnStop').style.display = 'none';
            document.getElementById('statusLabel').innerText = "WORKOUT FINISHED";
            
            if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
            
            // Zoom keluar untuk menampilkan seluruh rute jika data mencukupi
            if (pathCoordinates.length > 1) {
                const extent = vectorSource.getExtent();
                map.getView().fit(extent, { padding: [50, 50, 250, 50], duration: 1000 });
            }
        }

        document.getElementById('btnAction').onclick = toggleRecord;
        document.getElementById('btnStop').onclick = stopRecord;
        window.onload = initMap;
    </script>
</body>
</html>
